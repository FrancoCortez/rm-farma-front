<div class="grid">
  <div class="col-12">
    <div class="card">
      <p-table #dt
               [columns]="selectedColumns"
               [paginator]="true"
               [rowHover]="true"
               [rowsPerPageOptions]="[10,20,30,40,50]"
               [rows]="30"
               [tableStyle]="{'min-width': '50rem'}"
               [value]=historyPatient
               [exportFilename]="'report-history_patient_' + nowDate"
               responsiveLayout="scroll"
               [scrollable]="true"
               [loading]="loadingReport"
               [globalFilterFields]="['fullPatientName', 'patientRut','patientIdentification']"
               dataKey="patientRut"
               styleClass="p-datatable-gridlines">
        <ng-template pTemplate="caption">
          <div class="grid p-fluid mt-3">
            <div class="field col-12 md:col-4">
              <span class="p-float-label">
                <p-multiSelect
                  [(ngModel)]="selectedColumns"
                  [options]="cols"
                  [style]="{'min-width': '300px'}"
                  class="multiselect-custom"
                  display="comma"
                  id="multiselect"
                  inputId="multiselect"
                  optionLabel="header"
                  placeholder="Seleccione las columnas"
                  selectedItemsLabel="{0} columnas seleccionadas"
                />
                <label for="multiselect">Columnas</label>
              </span>
            </div>
            <div class="field md:col-8"></div>
            <div class="field col-12 md:col-6">
             <span class="block mt-2 md:mt-0 p-input-icon-left">
              <i class="pi pi-search"></i>
              <input pInputText type="text" (input)="onGlobalFilter(dt, $event)" placeholder="Buscar...">
            </span>
            </div>
            <div class="field md:col-4">
            </div>
            <div class="field col-12 md:col-2 flex align-items-center justify-content-end">
              <button pButton pRipple label="CSV" icon="pi pi-file-excel" class="p-button-help mr-3"
                      (click)="dt.exportCSV()"></button>
              <button pButton pRipple label="Excel" icon="pi pi-file-excel" class="p-button-help"
                      (click)="exportExcel()"></button>
            </div>
          </div>
        </ng-template>
        <ng-template let-columns pTemplate="header">
          <tr>
            <th *ngFor="let col of columns" style="min-width: 12rem">
              {{ col.header }}
            </th>
          </tr>
        </ng-template>
        <ng-template let-columns="columns" let-details pTemplate="body">
          <tr>
            <td *ngFor="let col of columns">
              {{ parseFieldInData(details, col.field) }}
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </div>
</div>
