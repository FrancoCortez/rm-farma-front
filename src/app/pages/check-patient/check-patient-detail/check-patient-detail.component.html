<div class="card">
  <h5>Proceso de Manufactura</h5>
  <div class="grid p-fluid mt-3">
    <div class="field col-12 md:col-4">
        <p-autoComplete
                        delay="300"
                        [autoZIndex]="false"
                        [baseZIndex]="1000"
                        [appendTo]="'body'"
                        [forceSelection]="true"
                        (completeMethod)="filterPatient($event)"
                        [suggestions]="suggestions"
                        (keydown.enter)="searchPatient()"
                        [(ngModel)]="searchPatientValue"
                        [virtualScroll]="true"
                        [virtualScrollItemSize]="34"
                        optionLabel="label"
                        [dropdown]="true" ></p-autoComplete>
    </div>
    <div class="col-12 md:col-4">
      <p-button (onClick)="searchPatient()" [style]="{'max-width': '50%'}" class="p-button-raised p-button-primary" icon="pi pi-search"
                label="Buscar..." pRipple></p-button>
    </div>
  </div>
</div>
<!--<div class="grid">-->
<div *ngIf="patientSearch?.identification" class="grid">
  <div class="col-12 md:col-12">
    <div class="card">
          <app-detail-patient [patientSearch]="patientSearch" (confirmEvent)="onConfirmEvent($event)"></app-detail-patient>
    </div>
  </div>
</div>

<app-spinner *ngIf="loadingPatient"></app-spinner>
<app-modal-error [display]="displayError" [message]="messageError" (confirm)="confirmDialogError($event)"></app-modal-error>
<app-modal-success (confirm)="confirmDialog($event)" [display]="displayOk"
                   [message]="'Se han creado los preparados con éxito'"></app-modal-success>
